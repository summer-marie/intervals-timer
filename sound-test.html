<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Sound Test</title>
    <style>
      body {
        font-family: sans-serif;
        padding: 2rem;
        background: #111;
        color: #fff;
      }
      button {
        margin: 0.5rem;
        padding: 1rem 2rem;
        font-size: 1rem;
        cursor: pointer;
        border-radius: 8px;
        border: none;
        background: #00d4d4;
        color: #000;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <h2>🔊 Audio Test for HIIT Timer</h2>
    <p>Click each button to test the sound. Make sure your volume is up.</p>
    <br />
    <button onclick="playRoundStart()">▶ Round Start Beep</button>
    <button onclick="playBreak()">⏸ Break Double Beep</button>
    <button onclick="playCountdown()">3️⃣ 3-2-1 Countdown</button>
    <button onclick="playComplete()">🎉 Workout Complete</button>

    <script>
      const ctx = new (window.AudioContext || window.webkitAudioContext)();

      function beep(freq, duration, delay = 0, vol = 0.3) {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.frequency.value = freq;
        osc.type = "sine";
        gain.gain.setValueAtTime(vol, ctx.currentTime + delay);
        gain.gain.exponentialRampToValueAtTime(
          0.001,
          ctx.currentTime + delay + duration,
        );
        osc.start(ctx.currentTime + delay);
        osc.stop(ctx.currentTime + delay + duration);
      }

      function playRoundStart() {
        beep(880, 0.1);
      }
      function playBreak() {
        beep(660, 0.1, 0);
        beep(660, 0.1, 0.2);
      }
      function playCountdown() {
        beep(440, 0.1, 0);
        beep(440, 0.1, 1);
        beep(440, 0.1, 2);
      }
      function playComplete() {
        beep(523, 0.15, 0);
        beep(659, 0.15, 0.2);
        beep(784, 0.3, 0.4);
      }
    </script>
  </body>
</html>
